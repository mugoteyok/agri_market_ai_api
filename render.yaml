services:

  - type: web

    name: agri-market-ai-api

    runtime: python

    pythonVersion: 3.11.9

    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:

      - key: PYTHON_VERSION
        value: "3.11.9"

      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_KEY
        sync: false
